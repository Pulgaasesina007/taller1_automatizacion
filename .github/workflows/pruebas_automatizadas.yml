name: Validacion de Pruebas Unitarias

# Se ejecutará automáticamente cada vez que exista un Push
on:
  push:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Obtener el código del repositorio
      uses: actions/checkout@v4

    # 1. Instalar Python
    - name: Instalar Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"

    # 2. Instalar dependencias
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 3 y 4. Ejecutar pytest y mostrar el resultado de las pruebas
    - name: Ejecutar pytest
      run: |
        pytest -v tests/